<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Board</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
        }
        .board {
            position: relative;
            width: 880px;
            height: 880px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }
        .cell {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }
        .circle {
            width: 60px;
            height: 60px;
            background: #ffffff;
            border-radius: 50%;
            cursor: pointer;
            border: 2px solid #444;
        }
        .circle.red {
            background: red;
        }
        .circle.blue {
            background: blue;
        }
        .arrow {
            font-size: 22px;
            font-weight: bold;
            color: #444;
        }
        .outer-square {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #222;
            pointer-events: none;
        }
        .inner-square {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px dashed #444;
            pointer-events: none;
        }
        /* RESET BUTTON */
        .reset-btn {
            margin-top: 25px;
            padding: 12px 30px;
            font-size: 16px;
            border: none;
            background: #333;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }
        .reset-btn:hover {
            background: #555;
        }
    </style>
</head>
<body>
    <div class="board">
        <div class="outer-square"></div>
        <div class="inner-square"></div>
        <!-- CELLS -->
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↓</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↓</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↑</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↓</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">→</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↑</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↑</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">→</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">→</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">→</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">→</div>
        </div>
    </div>
    <button class="reset-btn" id="resetBoard">Reset Board</button>
  <script>
    let player = "red";
    const outer = [0, 1, 2, 3, 7, 11, 15, 14, 13, 12, 8, 4];
    const inner = [5, 6, 10, 9];
    function getColor(el) {
        if (el.classList.contains("red")) return "red";
        if (el.classList.contains("blue")) return "blue";
        return "";
    }
    function setColor(el, color) {
        el.classList.remove("red", "blue");
        if (color) el.classList.add(color);
    }
    function rotateOrbit(indexes) {
        const circles = document.querySelectorAll(".circle");
        const colors = indexes.map(i => getColor(circles[i]));
        colors.unshift(colors.pop());
        indexes.forEach((idx, i) => {
            setColor(circles[idx], colors[i]);
        });
    }
    function rotateBoard() {
        rotateOrbit(outer);
        rotateOrbit(inner);
    }
    document.querySelectorAll(".circle").forEach(circle => {
        circle.addEventListener("click", function () {
            if (this.classList.contains("red") || this.classList.contains("blue")) return;
            this.classList.add(player);
            rotateBoard();
            player = player === "red" ? "blue" : "red";
        });
    });
    document.getElementById("resetBoard").addEventListener("click", function () {
        document.querySelectorAll(".circle").forEach(circle => {
            circle.classList.remove("red", "blue");
        });
        player = "red";
    });
</script>
</body>
</html>
