<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Board</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #f2f2f2;
            font-family: Arial, Helvetica, sans-serif;
        }

        .board {
            position: relative;
            width: 800px;
            height: 800px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
        }

        .cell {
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .circle {
            width: 60px;
            height: 60px;
            background: radial-gradient(circle at 30% 30%, #555, #fff);
            border-radius: 50%;
        }

        .arrow {
            font-size: 22px;
            font-weight: bold;
            color: #444;
        }

        .inner-square {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 4px dashed #444;
        }

        .outer-square {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 4px solid #222;
        }
    </style>
</head>

<body>
    <div class="board">
        <div class="outer-square"></div>
        <div class="inner-square"></div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↓</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↓</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">←</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↑</div>
        </div>
        <div class="cell">
            <div class="circle"></div>
            <div class="arrow">↓</div>
        </div>
        <div class="cell">

            <div class="arrow">→</div>
        </div>
        <div class="cell">

        <div class="cell">

            <div class="arrow">→</div>
        </div>
    </div>
</body>

</html>
