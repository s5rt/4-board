<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Board</title>

    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .board {
            position: relative;
            width: 800px;
            height: 800px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-template-rows: repeat(4, 1fr);
        }

        .cell {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .circle {
            width: 20px;
            height: 20px;
            background: black;
            border-radius: 50%;
        }

        .inner-square {
            position: absolute;
            width: 50%;
            height: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 3px dashed black;
        }

        .outer-square {
            position: absolute;
            width: 100%;
            height: 100%;
            border: 3px solid black;
        }
    </style>
</head>

<body>

    <div class="board">

        <div class="outer-square"></div>
        <div class="inner-square"></div>

        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>

        <div class="cell">
            <div class="circle"></div>
        </div>

            <div class="circle"></div>
        </div>

        </div>

        </div>

        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>

        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>
        <div class="cell">
            <div class="circle"></div>
        </div>

    </div>

</body>

</html>
